[flake8]
max-line-length = 120
exclude =
    backend/venv,
    backend/__pycache__,
    .git,
    *.egg-info,
    pfe/,
    docs/
extend-ignore =
    # Alignment spacing (intentional for readability)
    E221,E241,
    # Missing whitespace after comma (inside f-strings / long lines)
    E231,
    # Expected 2 blank lines (1 blank line used throughout for brevity)
    E302,E305,
    # Line too long (URLs, long strings, benchmark data)
    E501,
    # Continuation line indentation (complex multi-line calls)
    E127,E128,E129,E126,
    # Line break before/after binary operator (PEP 8 conflict)
    W503,W504,
