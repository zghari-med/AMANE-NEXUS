# ═══════════════════════════════════════════════════════════════════════════════
# GitLab CI/CD — AMANE-NEXUS · PFE MSID-TAM
# Équivalent du pipeline GitHub Actions (7 jobs)
# ═══════════════════════════════════════════════════════════════════════════════

variables:
  PYTHON_VERSION: "3.10"
  NODE_VERSION:   "18"
  DOCKER_DRIVER: overlay2
  # Registry GitLab Container (CI_REGISTRY_IMAGE fourni automatiquement)
  IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
  IMAGE_SHA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

# ── Ordre des stages ──────────────────────────────────────────────────────────
stages:
  - lint          # 1 · flake8 + eslint
  - test          # 2 · pytest + benchmarks + frontend build
  - docker        # 3 · build image
  - deploy        # 4 · push vers GitLab Container Registry (CD)
  - report        # 5 · rapport final

# ── Cache partagé pip ─────────────────────────────────────────────────────────
.pip-cache: &pip-cache
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - backend/.cache/pip
    policy: pull-push

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — LINT
# ═══════════════════════════════════════════════════════════════════════════════

lint-backend:
  stage: lint
  image: python:3.10-slim
  <<: *pip-cache
  script:
    - pip install flake8 --quiet
    - flake8 backend/ --max-line-length=120 --exclude=backend/venv,backend/__pycache__
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — TEST
# ═══════════════════════════════════════════════════════════════════════════════

test-backend:
  stage: test
  image: python:3.10-slim
  <<: *pip-cache
  needs: [lint-backend]
  services:
    - name: mongo:6
      alias: mongodb
  variables:
    MONGO_URI: mongodb://mongodb:27017/
    PIP_CACHE_DIR: backend/.cache/pip
  script:
    - pip install --upgrade pip --quiet
    - pip install -r backend/requirements.txt pytest pytest-cov --quiet
    - cd backend && pytest tests/ -v --cov=. --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always
    expire_in: 7 days

validate-benchmarks:
  stage: test
  image: python:3.10-slim
  needs: []
  script:
    - test -f backend/data/benchmark_results.json || (echo "benchmark_results.json manquant" && exit 1)
    - |
      python3 -c "
      import json
      d = json.load(open('backend/data/benchmark_results.json'))
      # Vérifie structure
      for key in ['environment','yolo_inference_benchmarks','model_accuracy','by_behavior']:
          assert key in d, f'Clé manquante: {key}'
      for btype in ['fall','crowding','abandoned_object']:
          assert btype in d['by_behavior'], f'Comportement manquant: {btype}'
      # Vérifie scores
      f1 = d['model_accuracy']['global']['f1_score']
      p  = d['model_accuracy']['global']['precision_pct']
      assert f1 >= 0.50, f'F1 trop bas: {f1} (minimum 0.50)'
      assert p  >= 40.0, f'Précision trop basse: {p}% (minimum 40%)'
      print(f'Benchmarks OK — F1={f1:.3f}  Précision={p:.1f}%')
      "
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-frontend:
  stage: test
  image: node:18-alpine
  needs: []
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
    policy: pull-push
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run lint --if-present || true
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — DOCKER BUILD
# ═══════════════════════════════════════════════════════════════════════════════

docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs: [test-backend, test-frontend, validate-benchmarks]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  script:
    - docker build -t amane-nexus:test .
    - echo "Image construite avec succès"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — DEPLOY (CD) — push vers GitLab Container Registry
# Déclenché uniquement sur push vers main
# ═══════════════════════════════════════════════════════════════════════════════

deploy:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  needs: [docker-build]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_SHA .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_SHA
    - echo "Image poussée vers $IMAGE_TAG"
    - echo "SHA tag     → $IMAGE_SHA"
  environment:
    name: production
    url: https://$CI_PROJECT_NAMESPACE.gitlab.io/$CI_PROJECT_NAME
  rules:
    # CD uniquement sur push vers main (pas sur MR ni autres branches)
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 5 — RAPPORT FINAL
# ═══════════════════════════════════════════════════════════════════════════════

pipeline-report:
  stage: report
  image: alpine:latest
  needs:
    - job: lint-backend
      optional: false
    - job: test-backend
      optional: false
    - job: validate-benchmarks
      optional: false
    - job: test-frontend
      optional: false
    - job: docker-build
      optional: false
    - job: deploy
      optional: true   # peut être skippé sur branches non-main
  when: always
  script:
    - |
      echo "================================================================"
      echo " PFE MSID-TAM — Rapport CI/CD GitLab"
      echo " Projet   : $CI_PROJECT_NAME"
      echo " Branche  : $CI_COMMIT_BRANCH"
      echo " Commit   : $CI_COMMIT_SHORT_SHA"
      echo " Auteur   : $CI_COMMIT_AUTHOR"
      echo "================================================================"
      echo " Lint backend     : OK (job précédent)"
      echo " Tests backend    : OK"
      echo " Benchmarks       : OK"
      echo " Frontend build   : OK"
      echo " Docker build     : OK"
      echo "================================================================"
      echo " STATUT : PIPELINE COMPLET — $CI_PIPELINE_URL"
  rules:
    - when: always
