# ═══════════════════════════════════════════════════════════════════════════════
# GitLab CI/CD — AMANE-NEXUS · PFE MSID-TAM
# ═══════════════════════════════════════════════════════════════════════════════

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
  IMAGE_SHA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

stages:
  - lint
  - test
  - docker
  - deploy
  - report

# ── Template réutilisable pip cache ──────────────────────────────────────────
.python-base:
  image: python:3.10-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
    policy: pull-push

# ── Template réutilisable Docker-in-Docker ────────────────────────────────────
.docker-base:
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — LINT
# ═══════════════════════════════════════════════════════════════════════════════

lint-backend:
  extends: .python-base
  stage: lint
  script:
    - pip install flake8 --quiet
    - flake8 backend/ --max-line-length=120
        --exclude=backend/venv,backend/__pycache__,backend/data

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — TEST (3 jobs en parallèle)
# ═══════════════════════════════════════════════════════════════════════════════

test-backend:
  extends: .python-base
  stage: test
  needs: [lint-backend]
  services:
    - name: mongo:6
      alias: mongodb
  variables:
    MONGO_URI: mongodb://mongodb:27017/
    MONGO_DB: surveillance_test
  script:
    - pip install --upgrade pip --quiet
    - pip install -r backend/requirements.txt pytest pytest-cov --quiet
    - cd backend
    - pytest tests/ -v
        --cov=.
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always
    expire_in: 7 days

validate-benchmarks:
  extends: .python-base
  stage: test
  needs: []
  script:
    - test -f backend/data/benchmark_results.json
        || (echo "ERREUR benchmark_results.json manquant" && exit 1)
    - python3 -c "
      import json, sys
      d = json.load(open('backend/data/benchmark_results.json'))
      for key in ['environment','yolo_inference_benchmarks','model_accuracy','by_behavior']:
          assert key in d, f'Cle manquante: {key}'
      for b in ['fall','crowding','abandoned_object']:
          assert b in d['by_behavior'], f'Comportement manquant: {b}'
      f1 = d['model_accuracy']['global']['f1_score']
      p  = d['model_accuracy']['global']['precision_pct']
      assert f1 >= 0.50, f'F1 trop bas: {f1}'
      assert p  >= 40.0, f'Precision trop basse: {p}%'
      print(f'Benchmarks OK — F1={f1:.3f}  Precision={p:.1f}%')
      "

test-frontend:
  stage: test
  image: node:18-alpine
  needs: []
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
    policy: pull-push
  script:
    - cd frontend
    - npm ci
    - npm run lint || true
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — DOCKER BUILD
# ═══════════════════════════════════════════════════════════════════════════════

docker-build:
  extends: .docker-base
  stage: docker
  needs: [test-backend, test-frontend, validate-benchmarks]
  script:
    - docker build -t amane-nexus:test .
    - echo "Image construite avec succes"
  # Docker-in-Docker nécessite un runner privileged — on tolère l'échec sur shared runners
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — DEPLOY CD — GitLab Container Registry (main uniquement)
# ═══════════════════════════════════════════════════════════════════════════════

deploy:
  extends: .docker-base
  stage: deploy
  needs: [docker-build]
  before_script:
    - docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_SHA .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_SHA
    - echo "Deploye vers $IMAGE_TAG"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 5 — RAPPORT FINAL
# ═══════════════════════════════════════════════════════════════════════════════

pipeline-report:
  stage: report
  image: alpine:latest
  when: always
  needs:
    - job: lint-backend
    - job: test-backend
    - job: validate-benchmarks
    - job: test-frontend
    - job: docker-build
      optional: true
    - job: deploy
      optional: true
  script:
    - |
      echo "================================================================"
      echo " PFE MSID-TAM — Rapport CI/CD GitLab"
      echo " Projet  : $CI_PROJECT_NAME"
      echo " Branche : $CI_COMMIT_BRANCH"
      echo " Commit  : $CI_COMMIT_SHORT_SHA"
      echo " Auteur  : $CI_COMMIT_AUTHOR"
      echo " URL     : $CI_PIPELINE_URL"
      echo "================================================================"
      echo " STATUT : PIPELINE TERMINE"
